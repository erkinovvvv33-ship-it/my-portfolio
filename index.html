<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hojaka · Links</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.2);
    --text: #f0f0f0;
    --muted: #6b7280;
    --accent: #7c6af7;
    --accent2: #f472b6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px 80px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(244,114,182,0.08) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  .noise {
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
  }

  .profile {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease both;
  }

  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 20px;
  }

  .avatar-ring {
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
    animation: spin 4s linear infinite;
  }

  .avatar {
    position: relative; z-index: 1;
    width: 96px; height: 96px;
    border-radius: 50%;
    border: 3px solid var(--bg);
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 36px; font-weight: 800;
    color: white;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .handle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .bio {
    font-size: 14px;
    color: rgba(240,240,240,0.55);
    line-height: 1.65;
    max-width: 300px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  .links { display: flex; flex-direction: column; gap: 10px; }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .link-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,106,247,0.06), rgba(244,114,182,0.04));
    opacity: 0; transition: opacity 0.25s;
  }

  .link-card:hover {
    background: var(--card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,106,247,0.15);
  }

  .link-card:hover::before { opacity: 1; }
  .link-card:active { transform: translateY(0); }

  .link-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    position: relative; z-index: 1;
    transition: transform 0.25s;
  }

  .link-card:hover .link-icon { transform: scale(1.08); }

  .link-text { flex: 1; position: relative; z-index: 1; }

  .link-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 600;
    line-height: 1; margin-bottom: 3px;
  }

  .link-sub { font-size: 12px; color: var(--muted); }

  .link-arrow {
    color: var(--muted);
    font-size: 16px;
    transition: transform 0.2s, color 0.2s;
    position: relative; z-index: 1;
  }

  .link-card:hover .link-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  .link-card.featured {
    background: linear-gradient(135deg, rgba(124,106,247,0.12), rgba(244,114,182,0.08));
    border-color: rgba(124,106,247,0.3);
  }

  .link-card.featured:hover {
    border-color: rgba(124,106,247,0.5);
    box-shadow: 0 8px 30px rgba(124,106,247,0.2);
  }

  .ic-telegram  { background: rgba(33,150,243,0.15); }
  .ic-instagram { background: rgba(225,48,108,0.15); }

  .badge {
    font-size: 10px; padding: 2px 8px;
    border-radius: 20px;
    background: rgba(124,106,247,0.2);
    color: #a78bfa;
    border: 1px solid rgba(124,106,247,0.3);
    font-weight: 600; letter-spacing: 0.3px;
    position: relative; z-index: 1;
  }

  .footer {
    text-align: center; margin-top: 40px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .footer p { font-size: 12px; color: rgba(107,114,128,0.5); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .link-card:nth-child(1) { animation-delay: 0.1s; }
  .link-card:nth-child(2) { animation-delay: 0.18s; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">

  <div class="profile">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar">HJ</div>
    </div>
    <h1 class="name">khojiakbar</h1>
    <p class="handle">@Erknv_210</p>
    <p class="bio">ijtimoiy tarmoqlarim</p>
  </div>

  <p class="section-label">Ijtimoiy tarmoqlar</p>
  <div class="links">

    <a href="https://t.me/Erknv_210" class="link-card featured" target="_blank">
      <div class="link-icon ic-telegram">✈️</div>
      <div class="link-text">
        <div class="link-title">Telegram</div>
        <div class="link-sub">@Erknv_210</div>
      </div>
      <span class="badge">Bog'laning</span>
      <span class="link-arrow">→</span>
    </a>

    <a href="https://instagram.com/ti.hojaka" class="link-card" target="_blank">
      <div class="link-icon ic-instagram">📸</div>
      <div class="link-text">
        <div class="link-title">Instagram</div>
        <div class="link-sub">@ti.hojaka</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

  </div>

  <div class="footer">
    <p>Made with ♥ · 2025</p>
  </div>

</div>
</body>
</html>
